kind = "web"
previewPath = "/"
title = "Pozo Home & Business"
version = "1.0.0"
id = "artifacts/pozo-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25740

[services.development]
run = "pnpm --filter @workspace/pozo-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pozo-web", "run", "build" ]
publicDir = "artifacts/pozo-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25740"
BASE_PATH = "/"
